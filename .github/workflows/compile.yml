name: Compilar ESP32

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  compilar:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Configurar ESP32
        run: |
          arduino-cli config init || true
          arduino-cli config set board_manager.additional_urls "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Instalar Bibliotecas
        run: |
          arduino-cli lib install "Adafruit GFX Library"
          arduino-cli lib install "Adafruit SSD1306"
          arduino-cli lib install "Adafruit BusIO"
          arduino-cli lib install "U8g2"
          arduino-cli lib install "RF24"
          arduino-cli lib install "rc-switch"
          arduino-cli lib install "SmartRC-CC1101-Driver-Lib@3.0.2"
          cd ~/Arduino/libraries
          git clone https://github.com/olikraus/U8g2_for_Adafruit_GFX.git 2>/dev/null || true

      - name: Corrigir CC1101
        run: |
          LIB="$HOME/Arduino/libraries/SmartRC-CC1101-Driver-Lib"
          cat > "$LIB/ELECHOUSE_CC1101_SRC_DRV2.h" << 'EOF'
          #ifndef ELECHOUSE_CC1101_SRC_DRV2_h
          #define ELECHOUSE_CC1101_SRC_DRV2_h
          #include "ELECHOUSE_CC1101_SRC_DRV.h"
          class ELECHOUSE_CC1101_2 : public ELECHOUSE_CC1101 {
            public: ELECHOUSE_CC1101_2() : ELECHOUSE_CC1101() {}
          };
          #endif
          EOF
          touch "$LIB/ELECHOUSE_CC1101_SRC_DRV2.cpp"

      - name: Corrigir erro BLE
        run: |
          sed -i 's/BLEScanResults\* scanResults = pBLEScan->start/BLEScanResults scanResults = pBLEScan->start/g' starbeam_v2/src/ble_scanner.cpp
          sed -i 's/scanResults->/scanResults./g' starbeam_v2/src/ble_scanner.cpp

      - name: Compilar
        run: |
          mkdir -p build
          arduino-cli compile --fqbn esp32:esp32:esp32 \
            --output-dir build \
            starbeam_v2/starbeam_v2.ino

      - name: Criar Firmware ZIP
        run: |
          mkdir -p firmware
          cp build/*.bin firmware/
          ESP32="$HOME/.arduino15/packages/esp32/hardware/esp32/2.0.17"
          cp "$ESP32/tools/sdk/esp32/bin/bootloader_dio_80m.bin" firmware/bootloader.bin
          cp "$ESP32/tools/sdk/esp32/bin/boot_app0.bin" firmware/
          cp "$ESP32/tools/partitions/default.bin" firmware/partitions.bin
          cd firmware
          mv *.ino.bin app.bin 2>/dev/null || true
          zip ../firmware_esp32.zip *.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32
          path: firmware_esp32.zip
