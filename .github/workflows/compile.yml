name: Build ESP32 Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Instalar Arduino CLI manualmente
      run: |
        curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
        sudo mv bin/arduino-cli /usr/local/bin/
        arduino-cli version

    - name: Configurar ESP32 Core
      run: |
        arduino-cli config init || true
        arduino-cli config set board_manager.additional_urls "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.17

    - name: Instalar bibliotecas necessárias
      run: |
        # Bibliotecas de display
        arduino-cli lib install "Adafruit GFX Library"
        arduino-cli lib install "Adafruit SSD1306"
        arduino-cli lib install "Adafruit BusIO"
        arduino-cli lib install "U8g2"
        
        # Bibliotecas de RF
        arduino-cli lib install "RF24"
        arduino-cli lib install "SmartRC-CC1101-Driver-Lib@3.0.2"
        arduino-cli lib install "rc-switch"  # <-- Biblioteca que faltava!

    - name: Corrigir referência da biblioteca CC1101
      run: |
        LIB_PATH="$HOME/Arduino/libraries/SmartRC-CC1101-Driver-Lib"
        
        if [ -d "$LIB_PATH" ]; then
          if [ -f "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV.h" ]; then
            cp "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV.h" "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV2.h"
          fi
          if [ -f "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV.cpp" ]; then
            cp "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV.cpp" "$LIB_PATH/ELECHOUSE_CC1101_SRC_DRV2.cpp"
          fi
          echo "Biblioteca CC1101 corrigida"
        fi

    - name: Compilar projeto
      run: |
        mkdir -p build
        
        # IMPORTANTE: Especifique o caminho correto do seu sketch principal
        # Ajuste conforme a estrutura do seu repositório
        # Exemplos comuns:
        SKETCH="starbeam_v2/starbeam_v2.ino"
        # ou: SKETCH="src/starbeam_v2.ino"
        # ou: SKETCH="firmware/starbeam_v2.ino"
        
        # Verificar se o arquivo existe
        if [ ! -f "$SKETCH" ]; then
          echo "Procurando arquivo .ino no repositório..."
          find . -name "*.ino" -type f ! -path "./SmartRC-CC1101-Driver-Lib/*" ! -path "./build/*" -print
          
          # Tenta encontrar o sketch principal (excluindo exemplos de bibliotecas)
          SKETCH=$(find . -name "*.ino" -type f ! -path "./SmartRC-CC1101-Driver-Lib/*" ! -path "./build/*" ! -path "*/examples/*" | head -1)
          
          if [ -z "$SKETCH" ]; then
            echo "Erro: Nenhum arquivo .ino válido encontrado"
            exit 1
          fi
        fi
        
        echo "Compilando: $SKETCH"
        
        arduino-cli compile --fqbn esp32:esp32:esp32 \
          --output-dir build \
          "$SKETCH"

    - name: Preparar arquivos binários
      run: |
        mkdir -p firmware
        cp build/*.bin firmware/ 2>/dev/null || true
        
        ESP32_PATH="$HOME/.arduino15/packages/esp32/hardware/esp32/2.0.17"
        
        if [ -d "$ESP32_PATH" ]; then
          cp "$ESP32_PATH/tools/sdk/esp32/bin/bootloader_dio_80m.bin" firmware/bootloader.bin
          cp "$ESP32_PATH/tools/sdk/esp32/bin/boot_app0.bin" firmware/
          cp "$ESP32_PATH/tools/partitions/default.bin" firmware/partitions.bin 2>/dev/null || \
          cp "$ESP32_PATH/tools/sdk/esp32/bin/partitions.bin" firmware/partitions.bin
        fi
        
        ls -la firmware/

    - name: Criar ZIP com firmware
      run: |
        cd firmware
        
        # Renomear o arquivo principal
        for f in *.ino.bin; do
          [ -f "$f" ] && mv "$f" app.bin"
        done
        
        # Criar ZIP
        zip ../firmware_esp32.zip bootloader.bin partitions.bin boot_app0.bin app.bin
        
        cd ..
        ls -la firmware_esp32.zip
        unzip -l firmware_esp32.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-esp32
        path: |
          firmware_esp32.zip
          firmware/*.bin
